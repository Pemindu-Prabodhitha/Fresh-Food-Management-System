<!DOCKTYPE html>
<html lang="en">
    <head>
        <title>Manage Products</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <header>
            <table class="header-title">
                <tr>
                    <td><img src="Resourses/logofinal.png" alt="logo" width="250"></td>
                    <td><span class="brand-name">Fresh Ceylon</span></td>
                </tr>
            </table>
            <nav>
                <ul >
                    <li class="logout-btn"><a href="index.html" class="logout-btn">Logout</a></li>
                </ul>
            </nav>
        </header>
        <div class="suplier-dashboard">
            <nav class="sidebar">
                <a class="nav-item" href="supplier_overview.html">Overview</a>
                <a class="nav-item" href="orders.html">Orders</a>
                <a class="nav-item active" href="supplier_ManageProducts.html">Manage Products</a>
                <a class="nav-item" href="supplier_earnings.html">Earnings</a>
                <a class="nav-item" href="supplier_settings.html">Settings</a>
            </nav>
            <main class="main-content">
                <div class="row-1">
                    <div class="search-bar">
                        <form action="/search" method="get" class="search-form">
                            <input type="text" name="product" placeholder="Search" class="search-input">
                            <button type="submit" class="search-button"></button>
                        </form>
                    </div>
                    <div>
                        <a href="addItem.html" class="addItem-btn">+ Add New Product</a>
                    </div>
                </div>
                <div class="row-2">
                        <h3>All Products</h3>
                        <table class="manage-table">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Stock Levels</th>
                                    <th>Unit Price</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Carrots</td>
                                    <td>85 kg Left</td>
                                    <td>LKR 280.00</td>
                                    <td><button class="edit-btn">Edit</button></td>
                                </tr>
                                <tr>
                                    <td>Fresh Papaya</td>
                                    <td>5 kg Left</td>
                                    <td>LKR 150.00</td>
                                    <td><button class="edit-btn">Edit</button></td>
                                </tr>
                                <tr>
                                    <td>Orange</td>
                                    <td>12 kg Left</td>
                                    <td>LKR 80.00</td>
                                    <td><button class="edit-btn">Edit</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
            </main>

        </div>
    </body>
</html>
